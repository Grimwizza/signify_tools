name: Fetch Google Trends Daily

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-trends:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Fetch Trends Data
        run: npm run fetch-trends

      - name: Fetch Stock Price
        run: node scripts/fetch-stock.js

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/trends.json data/stock.json
          if ! git diff --cached --quiet; then
            git commit -m "data: update trends and stock data [skip ci]"
            git push
          else
            echo "No changes in data. Skipping commit."
          fi
